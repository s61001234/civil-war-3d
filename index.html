<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>國共內戰互動歷史地圖 1927–1949</title>
<style>
:root{
  --kmt:#1e50a2; --kmt-fill:rgba(40,90,180,.42);
  --ccp:#c0392b; --ccp-fill:rgba(200,50,40,.45);
  --jp:#6b6b6b;  --jp-fill:rgba(110,110,110,.40);
  --warlord:#8a6d3b; --warlord-fill:rgba(160,130,70,.38);
  --contested:#7d5fa0; --contested-fill:rgba(130,100,170,.35);
  --bg:#0e1420; --panel:#16202f; --panel2:#1c2940; --text:#e8eef7; --dim:#9fb0c8;
  --sea:#152238; --land:#243349; --border:#3a4d6b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap;z-index:30}
header h1{font-size:17px;font-weight:700;letter-spacing:1px}
header .sub{font-size:12px;color:var(--dim)}
.btns{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.btn{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer;user-select:none}
.btn:hover{background:#26354f}
.btn.active{background:var(--kmt);border-color:var(--kmt)}
#mapwrap{flex:1;position:relative;overflow:hidden;background:var(--sea)}
#mapsvg{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
#mapsvg:active{cursor:grabbing}
.prov{fill:var(--land);stroke:var(--border);stroke-width:.7;transition:fill .6s}
.prov.kmt{fill:var(--kmt-fill)} .prov.ccp{fill:var(--ccp-fill)} .prov.jp{fill:var(--jp-fill)}
.prov.warlord{fill:var(--warlord-fill)} .prov.contested{fill:var(--contested-fill)}
.provname{fill:#b8c6da;font-size:10px;text-anchor:middle;pointer-events:none;opacity:.85}
.river{fill:none;stroke:#4a7fb5;stroke-width:1.4;opacity:.7}
.rivername{fill:#7da7cf;font-size:9px;pointer-events:none;opacity:.8}
.mtn{fill:#8d9bb0;font-size:9px;pointer-events:none;opacity:.7;font-style:italic}
.city circle{fill:#f0d589;stroke:#9c8430;stroke-width:.8}
.city.capital circle{fill:#ffe9a8;stroke:#caa53d;stroke-width:1.2}
.city text{fill:#f5e6bd;font-size:10px;pointer-events:none;text-shadow:0 0 3px #000}
.city{cursor:pointer}
.zone{stroke-width:1.2;stroke-dasharray:4 3;opacity:.9;transition:opacity .6s}
.zone.ccp{fill:rgba(210,60,45,.40);stroke:#e06a55}
.zone.kmt{fill:rgba(40,90,180,.40);stroke:#5b8ad6}
.zonelabel{font-size:10px;fill:#ffb3a3;text-anchor:middle;pointer-events:none;text-shadow:0 0 3px #000}
.army{cursor:pointer}
.army rect{rx:3;opacity:.92}
.army.kmt rect{fill:#1e50a2;stroke:#7fa8e8;stroke-width:.6}
.army.ccp rect{fill:#a8322a;stroke:#e8907f;stroke-width:.6}
.army text{fill:#fff;font-size:9px;text-anchor:middle;pointer-events:none}
.battle{cursor:pointer}
.battle .star{fill:#ffd34d;stroke:#a3741c;stroke-width:.8}
.battle.cwin .star{fill:#ff6b5e;stroke:#8e2a20}
.battle.kwin .star{fill:#6fa3ff;stroke:#1e3f7d}
.battle text{fill:#ffe08a;font-size:10px;font-weight:700;text-shadow:0 0 4px #000;pointer-events:none}
.arrow{fill:none;stroke-width:2.4;opacity:.85;stroke-linecap:round}
.arrow.kmt{stroke:#5b8ad6} .arrow.ccp{stroke:#e0584a}
.arrowhead.kmt{fill:#5b8ad6} .arrowhead.ccp{fill:#e0584a}
.marchroute{fill:none;stroke:#ff7a5c;stroke-width:2.6;stroke-dasharray:7 5;filter:drop-shadow(0 0 3px rgba(255,90,60,.7))}
#narr{position:absolute;top:10px;left:10px;max-width:340px;background:rgba(18,26,40,.92);border:1px solid var(--border);border-radius:10px;padding:10px 14px;z-index:10;backdrop-filter:blur(4px)}
#narr h2{font-size:15px;color:#ffd98a;margin-bottom:4px}
#narr .yr{font-size:12px;color:var(--dim)}
#narr p{font-size:12.5px;line-height:1.55;margin-top:6px;color:#dbe5f2}
#legend{position:absolute;bottom:10px;right:10px;background:rgba(18,26,40,.9);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:11px;z-index:10}
#legend div{display:flex;align-items:center;gap:6px;margin:3px 0}
#legend i{display:inline-block;width:14px;height:10px;border-radius:2px}
footer{background:var(--panel);border-top:1px solid var(--border);padding:8px 16px 12px;z-index:30}
#phasebtns{display:flex;gap:4px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
#phasebtns .pb{flex-shrink:0;font-size:11.5px;padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:var(--panel2);color:var(--dim);cursor:pointer;white-space:nowrap}
#phasebtns .pb.active{background:#7a2f27;color:#fff;border-color:#c0594c}
#sliderrow{display:flex;align-items:center;gap:12px}
#yearlabel{font-size:20px;font-weight:800;color:#ffd98a;min-width:64px;text-align:center;font-variant-numeric:tabular-nums}
#slider{flex:1;-webkit-appearance:none;height:8px;border-radius:4px;background:linear-gradient(to right,var(--kmt),#5a4470,var(--ccp));outline:none}
#slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#ffd98a;border:3px solid #a3741c;cursor:pointer}
#slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#ffd98a;border:3px solid #a3741c;cursor:pointer}
#playbtn{font-size:16px;width:40px;height:34px}
#popup{position:absolute;inset:auto 0 0 0;max-height:62%;background:var(--panel2);border-top:2px solid #caa53d;border-radius:14px 14px 0 0;padding:16px 18px;overflow-y:auto;z-index:40;transform:translateY(105%);transition:transform .3s;box-shadow:0 -6px 30px rgba(0,0,0,.5)}
#popup.show{transform:translateY(0)}
#popup h3{color:#ffd98a;font-size:16px;margin-bottom:2px;padding-right:36px}
#popup .meta{font-size:12px;color:var(--dim);margin-bottom:8px}
#popup .row{font-size:13px;line-height:1.6;margin:5px 0}
#popup .row b{color:#aac4ea}
#popup .note{font-size:12px;background:rgba(160,130,60,.15);border-left:3px solid #caa53d;padding:6px 9px;border-radius:0 6px 6px 0;margin-top:9px;line-height:1.55;color:#e8d9ae}
#popup .closex{position:absolute;top:10px;right:12px;width:30px;height:30px;border-radius:50%;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:15px;cursor:pointer}
#popup .result-c{color:#ff8a7a;font-weight:700} #popup .result-k{color:#8ab2f5;font-weight:700} #popup .result-n{color:#d6c98a;font-weight:700}
.cmdlink{color:#ffc9a3;text-decoration:underline dotted;cursor:pointer}
@media(min-width:760px){
  #popup{inset:auto auto 70px 10px;width:400px;max-height:55%;border:1px solid #caa53d;border-radius:12px;transform:translateX(-115%) }
  #popup.show{transform:translateX(0)}
}
@media(max-width:600px){
  header h1{font-size:14px} header .sub{display:none}
  #narr{max-width:62%;padding:8px 10px} #narr p{font-size:11px;max-height:110px;overflow-y:auto}
  #narr h2{font-size:13px}
  #legend{font-size:9.5px;padding:5px 8px;bottom:6px;right:6px}
  #yearlabel{font-size:16px;min-width:48px}
  .btn{font-size:11.5px;padding:4px 7px}
}
</style>
</head>

zhouenlai:{zh:"周恩來",en:"Zhou Enlai",side:"ccp",bio:{zh:"南昌起義主要領導人，長期主持中共軍事與統戰工作。西安事變中代表中共談判，促成和平解決。",en:"Principal leader of the Nanchang Uprising and the CCP's chief negotiator; brokered the peaceful resolution of the Xi'an Incident."}},
linbiao:{zh:"林彪",en:"Lin Biao",side:"ccp",bio:{zh:"紅一軍團、八路軍115師、東北野戰軍（第四野戰軍）司令員。指揮平型關伏擊與遼瀋、平津兩大戰役，自東北一路打到海南島。",en:"Commander of the Northeast (4th) Field Army. Led the Pingxingguan ambush and the Liaoshen and Pingjin campaigns, fighting from Manchuria all the way to Hainan."}},
pengdehuai:{zh:"彭德懷",en:"Peng Dehuai",side:"ccp",bio:{zh:"紅三軍團、八路軍副總指揮、第一野戰軍司令員。1940年發動百團大戰；1947年起以少擊多保衛陝北，1949年解放大西北。",en:"Deputy commander of the 8th Route Army and commander of the 1st Field Army. Launched the Hundred Regiments Offensive in 1940; defended northern Shaanxi and took the Northwest in 1949."}},
liubocheng:{zh:"劉伯承",en:"Liu Bocheng",side:"ccp",bio:{zh:"號稱「軍神」的中原野戰軍（第二野戰軍）司令員。1947年與鄧小平千里躍進大別山，淮海戰役主要指揮者之一。",en:"Commander of the Central Plains (2nd) Field Army, known as the 'God of War.' Led the daring 1947 thrust into the Dabie Mountains; a principal commander at Huaihai."}},
suyu:{zh:"粟裕",en:"Su Yu",side:"ccp",bio:{zh:"華東野戰軍（第三野戰軍）代司令員、實際戰役指揮者。孟良崮全殲整編74師，淮海戰役殲敵主力，被視為中共最傑出的戰役指揮官之一。",en:"De facto operational commander of the East China (3rd) Field Army. Annihilated the elite 74th Division at Menglianggu and masterminded the Huaihai Campaign."}},
chenyi:{zh:"陳毅",en:"Chen Yi",side:"ccp",bio:{zh:"新四軍代軍長、華東野戰軍司令員兼政委。與粟裕搭檔指揮華東戰場，1949年5月任上海市長。",en:"Commander and political commissar of the East China Field Army, partnered with Su Yu; became mayor of Shanghai in May 1949."}},
nierongzhen:{zh:"聶榮臻",en:"Nie Rongzhen",side:"ccp",bio:{zh:"晉察冀根據地創建者、華北軍區司令員，平津戰役指揮者之一。",en:"Founder of the Jin-Cha-Ji base area and commander of the North China Military Region; a commander in the Pingjin Campaign."}},
helong:{zh:"賀龍",en:"He Long",side:"ccp",bio:{zh:"南昌起義總指揮，兩把菜刀起家的傳奇將領。創建湘鄂西根據地，率紅二方面軍長征，抗戰任120師師長。",en:"Commander-in-chief of the Nanchang Uprising. Founded the Hunan-West Hubei base and led the 2nd Front Red Army on its Long March."}},
xuxiangqian:{zh:"徐向前",en:"Xu Xiangqian",side:"ccp",bio:{zh:"紅四方面軍總指揮，鄂豫皖與川陝蘇區主要軍事領導人。1948–49年指揮太原戰役。",en:"Commander of the 4th Front Red Army in the E-Yu-Wan and Sichuan-Shaanxi soviets; directed the siege of Taiyuan in 1948–49."}},
luoronghuan:{zh:"羅榮桓",en:"Luo Ronghuan",side:"ccp",bio:{zh:"東北野戰軍政治委員，與林彪搭檔指揮遼瀋、平津戰役；抗戰時期主持山東根據地。",en:"Political commissar of the Northeast Field Army, partnering Lin Biao at Liaoshen and Pingjin; ran the Shandong base during WWII."}},
yeting:{zh:"葉挺",en:"Ye Ting",side:"ccp",bio:{zh:"北伐名將「鐵軍」獨立團團長，南昌起義前敵總指揮，新四軍首任軍長，皖南事變中被俘。",en:"Commander of the famed 'Iron Army' regiment in the Northern Expedition; first commander of the New 4th Army, captured in the 1941 New 4th Army Incident."}},
zhangxueliang:{zh:"張學良",en:"Zhang Xueliang",side:"kmt",bio:{zh:"奉系領袖張作霖之子，1928年東北易幟歸附國民政府。1936年12月與楊虎城發動西安事變，後遭長期軟禁。",en:"Son of warlord Zhang Zuolin; pledged Manchuria to the Nationalists in 1928. Launched the Xi'an Incident in 1936 and spent decades under house arrest."}}};

{id:1,years:[1927.2,1928.4],title:{zh:"寧漢分裂與清黨",en:"The Split & the Purge"},yr:"1927–1928",
narrative:{zh:"1927年4月12日蔣介石在上海清黨，大批共產黨員與工會成員被處決；武漢汪精衛政府與南京對立（寧漢分裂），7月武漢亦「分共」，第一次國共合作徹底破裂。中共於8月1日發動南昌起義，9月毛澤東領導秋收起義，12月廣州起義；起義相繼失利後，毛澤東率部上井岡山，1928年4月與朱德會師，開始走「農村包圍城市」的道路。",en:"On April 12, 1927 Chiang purged the Communists in Shanghai; the rival Wuhan government under Wang Jingwei broke with the CCP by July, ending the First United Front. The CCP answered with uprisings at Nanchang (Aug 1), the Autumn Harvest Uprising (Sept) and Guangzhou (Dec). After their defeat, Mao took his survivors to the Jinggang Mountains, joined by Zhu De in April 1928 — the start of rural revolutionary strategy."},

{p:[115.86,28.68],zh:"南昌起義",en:"Nanchang Uprising",alt:{zh:"八一起義／建軍節由來",en:"'August 1' Army Day origin"},date:"1927.8.1",result:"ccp",k:{str:{zh:"朱培德等留守部隊",en:"local garrison"}},c:{str:{zh:"約2萬餘人",en:"~20,000+"},cmd:["zhouenlai","zhude","helong","yeting"]},desc:{zh:"周恩來、賀龍、葉挺、朱德等率部起義佔領南昌，是中共獨立領導武裝鬥爭之始。起義軍南下廣東途中失利，餘部由朱德率領轉戰湘南。",en:"Zhou Enlai, He Long, Ye Ting and Zhu De seized Nanchang — the CCP's first independent armed action. The force was defeated marching south; Zhu De led the remnants to southern Hunan."},note:{zh:"起義當日佔城成功，但戰略上失敗（南下潰敗）；中共以此日為建軍節。",en:"Tactically successful for a day but strategically defeated; commemorated as PLA founding day."}},

{p:[113.26,23.13],zh:"廣州起義",en:"Guangzhou Uprising",date:"1927.12.11",result:"kmt",k:{str:{zh:"張發奎部回師鎮壓",en:"Zhang Fakui's forces"}},c:{str:{zh:"教導團與工人赤衛隊約2萬",en:"~20,000 cadets & Red Guards"}},desc:{zh:"中共在廣州建立「廣州蘇維埃」，三日即被鎮壓，死難者五千以上，葉挺、葉劍英等突圍。",en:"A three-day 'Canton Soviet' crushed with over 5,000 killed; Ye Ting and Ye Jianying escaped."}},

{id:2,years:[1930,1934.7],title:{zh:"中央蘇區與五次圍剿",en:"Soviets & Encirclements"},yr:"1930–1934",
narrative:{zh:"中共在贛南閩西建立中央蘇區，1931年11月在瑞金成立「中華蘇維埃共和國」；另有鄂豫皖、湘鄂西、川陝等蘇區。1930–34年國軍發動五次圍剿：前三次（10萬→30萬兵力）被紅軍誘敵深入各個擊破；第四次亦失利；第五次蔣介石調集數十萬大軍採德國顧問的碉堡推進戰術，紅軍在「左」傾路線下硬拚消耗，1934年4月廣昌失守，中央蘇區瀕臨絕境。同期1931年九一八事變，日本佔領東北。",en:"The CCP built the Central Soviet in southern Jiangxi/western Fujian, proclaiming the Chinese Soviet Republic at Ruijin in Nov 1931, alongside the E-Yu-Wan, Hunan-West-Hubei and Sichuan-Shaanxi soviets. Five Nationalist encirclement campaigns followed: the first four (100,000–300,000 men) were defeated by mobile tactics, but the fifth used blockhouse warfare on German advice; after Guangchang fell in April 1934 the soviet was doomed. Meanwhile Japan seized Manchuria after the 1931 Mukden Incident."},

{p:[116.34,26.84],zh:"第五次圍剿・廣昌戰役",en:"5th Encirclement: Guangchang",date:"1934.4",result:"kmt",k:{str:{zh:"圍剿總兵力數十萬，碉堡推進",en:"hundreds of thousands, blockhouse tactics"},cmd:["chiang"]},c:{str:{zh:"紅軍主力約10萬",en:"~100,000"}},desc:{zh:"第五次圍剿中，紅軍在博古、李德指揮下與優勢國軍打陣地消耗戰，廣昌血戰18天失守，中央蘇區門戶洞開，長征已不可避免。",en:"Under Bo Gu and Otto Braun the Red Army fought positional battles against overwhelming force; Guangchang fell after 18 days, dooming the Central Soviet and forcing the Long March."},note:{zh:"國軍此次圍剿兵力常稱「百萬」，係含各戰區總數；直接用於進攻中央蘇區者約50萬。",en:"The oft-cited 'one million' includes all theaters; ~500,000 directly attacked the Central Soviet."}},
{p:[123.43,41.80],zh:"九一八事變",en:"Mukden Incident",date:"1931.9.18",result:"none",k:null,c:null,desc:{zh:"日本關東軍自導自演炸毀南滿鐵路，隨即進攻瀋陽北大營。東北軍奉行不抵抗，數月內東北全境淪陷，1932年偽滿洲國成立。",en:"The Kwantung Army staged a railway bombing as pretext to seize Shenyang. Under non-resistance orders, all Manchuria fell within months; the puppet state Manchukuo was created in 1932."},note:{zh:"「不抵抗」命令出自張學良或蔣介石，史學界仍有爭論；張晚年自承為其本人決定。",en:"Historians long debated who issued the non-resistance order; Zhang Xueliang later said the decision was his own."}}],

{id:3,years:[1934.75,1936.85],title:{zh:"長征",en:"The Long March"},yr:"1934–1936",
narrative:{zh:"1934年10月，中央紅軍8.6萬人撤離中央蘇區突圍西進。湘江一役折損過半；1935年1月遵義會議確立毛澤東領導地位。此後四渡赤水、巧渡金沙江、強渡大渡河、飛奪瀘定橋、翻雪山過草地，1935年10月抵達陝北吳起鎮時僅餘數千人。紅二方面軍、紅四方面軍亦先後長征，1936年10月三大主力於甘肅會寧會師，行程號稱二萬五千里。",en:"In October 1934, 86,000 troops of the Central Red Army broke out of the Jiangxi soviet. Over half were lost crossing the Xiang River; the January 1935 Zunyi Conference made Mao the de facto leader. After crossing the Chishui four times, the Jinsha and Dadu rivers, the snow mountains and the grasslands, only a few thousand reached Wuqi in northern Shaanxi in October 1935. The three main Red armies reunited at Huining, Gansu, in October 1936 — a march famed as '25,000 li.'"},

battles:[
{p:[110.65,25.92],zh:"湘江戰役",en:"Xiang River",date:"1934.11–12",result:"kmt",k:{str:{zh:"中央軍與湘桂軍約30萬",en:"~300,000 central & provincial troops"}},c:{str:{zh:"8.6萬 → 戰後約3萬餘",en:"86,000 → ~30,000 after"}},desc:{zh:"紅軍強渡湘江突破第四道封鎖線，血戰五晝夜，兵力自8.6萬銳減至3萬餘，是長征中最慘烈的一戰。",en:"Breaking the fourth blockade line across the Xiang River cost the Red Army more than half its strength in five days — the bloodiest episode of the Long March."}},
{p:[106.92,27.73],zh:"遵義會議",en:"Zunyi Conference",date:"1935.1",result:"ccp",k:null,c:null,desc:{zh:"中共中央政治局擴大會議檢討第五次反圍剿失敗，批判博古、李德軍事路線，毛澤東進入核心決策層，實際取得軍事領導權。",en:"An enlarged Politburo meeting blamed Bo Gu and Otto Braun for the soviet's fall and brought Mao into the military leadership core."}},
{p:[105.7,28.4],zh:"四渡赤水",en:"Four Crossings of the Chishui",date:"1935.1–3",result:"ccp",k:{str:{zh:"川滇黔軍與中央軍40萬",en:"~400,000"},cmd:["xueyue"]},c:{str:{zh:"約3萬",en:"~30,000"},cmd:["mao"]},desc:{zh:"紅軍在赤水河兩岸反覆機動，四次渡河聲東擊西，跳出數十萬國軍合圍，被視為毛澤東軍事指揮的得意之筆。",en:"Feinting back and forth across the Chishui River four times, the Red Army slipped a noose of 400,000 troops — celebrated as Mao's masterpiece of maneuver."}},
{p:[102.23,29.91],zh:"飛奪瀘定橋",en:"Luding Bridge",date:"1935.5.29",result:"ccp",k:{str:{zh:"川軍守橋部隊",en:"Sichuan garrison"}},c:{str:{zh:"紅四團22名突擊隊員",en:"22 assault troops, Red 4th Regiment"}},desc:{zh:"紅軍先頭部隊一晝夜奔襲240里，沿僅餘鐵索的瀘定橋攀爬突擊奪橋，使主力得以渡過大渡河。",en:"After a forced march of 120 km in a day, vanguard troops crawled across the chain bridge at Luding under fire, securing the Dadu River crossing."},note:{zh:"中共敘事中22勇士冒槍林彈雨奪橋；部分史家認為守軍薄弱、戰鬥規模有限。雙方記載差異大。",en:"In CCP accounts a heroic assault under heavy fire; some historians argue the bridge was lightly defended. Accounts differ considerably."}},
{p:[108.18,36.92],zh:"吳起鎮會師／直羅鎮戰役",en:"Wuqi & Zhiluozhen",date:"1935.10–11",result:"ccp",k:{str:{zh:"東北軍109師等",en:"NE Army 109th Div."}},c:{str:{zh:"紅一方面軍約萬餘",en:"~10,000+"},cmd:["mao","pengdehuai"]},desc:{zh:"中央紅軍抵達陝北與劉志丹陝甘紅軍會合；11月直羅鎮殲東北軍一個師，為中共中央落腳西北「奠基」。",en:"The Central Red Army reached the Shaanxi-Gansu soviet; the November victory at Zhiluozhen destroyed a pursuing division and secured the new northwestern base."}}],

{id:4,years:[1936.9,1937.5],title:{zh:"西安事變與二次合作",en:"Xi'an Incident & 2nd United Front"},yr:"1936–1937",
narrative:{zh:"1936年12月12日，張學良、楊虎城在西安扣留前來督剿的蔣介石，要求停止內戰、一致抗日。經周恩來等斡旋，事變和平解決，蔣承諾停止剿共。1937年七七事變後第二次國共合作正式形成：紅軍主力改編為國民革命軍第八路軍（朱德任總指揮，轄115、120、129師），南方游擊隊改編為新四軍（葉挺任軍長）。",en:"On Dec 12, 1936, Zhang Xueliang and Yang Hucheng detained Chiang Kai-shek in Xi'an, demanding an end to the civil war to resist Japan. Mediated by Zhou Enlai, the incident ended peacefully. After the Marco Polo Bridge Incident of July 1937, the Second United Front formed: the Red Army became the 8th Route Army (under Zhu De, with the 115th, 120th and 129th Divisions), and southern guerrillas became the New 4th Army under Ye Ting."},

battles:[
{p:[108.94,34.34],zh:"西安事變",en:"Xi'an Incident",alt:{zh:"雙十二事變",en:"'Double Twelve Incident'"},date:"1936.12.12",result:"none",k:null,c:null,desc:{zh:"張學良、楊虎城發動「兵諫」，在華清池扣留蔣介石。中共派周恩來協商，宋美齡、宋子文斡旋，12月25日蔣獲釋返京，內戰實質停止。張學良送蔣回京後遭軟禁逾半世紀。",en:"Zhang Xueliang and Yang Hucheng seized Chiang at Huaqing Hot Springs in a 'military remonstrance.' With Zhou Enlai mediating, Chiang was released on Dec 25 after agreeing to halt the civil war. Zhang spent over fifty years under house arrest."}},
{p:[116.21,39.84],zh:"盧溝橋事變",en:"Marco Polo Bridge Incident",alt:{zh:"七七事變",en:"'July 7 Incident'"},date:"1937.7.7",result:"none",k:null,c:null,desc:{zh:"日軍在北平西南盧溝橋藉口士兵失蹤挑起戰端，中日全面戰爭爆發，國共內戰讓位於八年抗戰。",en:"A Japanese provocation at the Marco Polo Bridge southwest of Beiping ignited full-scale war with Japan, suspending the civil war for eight years."}}],

{id:5,years:[1937.5,1945.6],title:{zh:"抗日戰爭時期",en:"War of Resistance (WWII)"},yr:"1937–1945",
narrative:{zh:"抗戰期間日軍佔領東北、華北、華東與華南沿海精華地帶；國民政府遷都重慶，正面戰場歷經淞滬、徐州、武漢、三次長沙等大會戰。中共在敵後建立陝甘寧、晉察冀、晉冀魯豫、山東、華中等根據地，八路軍、新四軍由數萬發展至1945年的約91萬正規軍。1940年百團大戰後日軍報復「掃蕩」；1941年皖南事變使國共摩擦公開化。雙方在抗日的同時都在為戰後對決積蓄力量。",en:"Japan occupied Manchuria, North China, and the eastern seaboard; the Nationalist government fought major conventional battles (Shanghai, Xuzhou, Wuhan, Changsha) from its wartime capital Chongqing. Behind Japanese lines the CCP built base areas — Shaan-Gan-Ning, Jin-Cha-Ji, Jin-Ji-Lu-Yu, Shandong, Central China — growing to ~910,000 regulars by 1945. The 1940 Hundred Regiments Offensive brought brutal reprisals; the 1941 New 4th Army Incident exposed KMT-CCP friction. Both sides husbanded strength for the showdown to come."},

{p:[113.31,39.42],zh:"平型關大捷",en:"Pingxingguan Ambush",date:"1937.9.25",result:"ccp",k:null,c:{str:{zh:"八路軍115師約6,000",en:"~6,000, 115th Division"},cmd:["linbiao"]},desc:{zh:"林彪率115師在晉北平型關伏擊日軍第5師團輜重隊，殲敵約千人，是八路軍出師抗日首勝，打破「日軍不可戰勝」之說。",en:"Lin Biao's 115th Division ambushed a supply column of the Japanese 5th Division, killing about 1,000 — the 8th Route Army's first victory against Japan."},note:{zh:"早年宣傳稱殲敵萬餘；史料考訂實為殲滅輜重與後衛部隊約千人。",en:"Early propaganda claimed 10,000+ enemy dead; research puts it near 1,000 rear-echelon troops."}},
{p:[113.7,37.9],zh:"百團大戰",en:"Hundred Regiments Offensive",date:"1940.8–12",result:"ccp",k:null,c:{str:{zh:"八路軍105個團約20–40萬",en:"105 regiments, ~200,000–400,000"},cmd:["pengdehuai"]},desc:{zh:"彭德懷指揮八路軍對華北日軍交通線發動大規模破襲戰，重創正太鐵路等線。日軍隨後展開殘酷的「三光」掃蕩，根據地一度嚴重萎縮。",en:"Peng Dehuai's massive sabotage offensive crippled Japanese rail lines in North China. Japan retaliated with scorched-earth 'Three Alls' campaigns that severely shrank the base areas."}},
{p:[118.4,30.7],zh:"皖南事變",en:"New 4th Army Incident",alt:{zh:"千古奇冤（中共稱）",en:"'Wannan Incident'"},date:"1941.1",result:"kmt",k:{str:{zh:"第三戰區約8萬",en:"~80,000, 3rd War Zone"}},c:{str:{zh:"新四軍軍部約9,000",en:"~9,000 HQ column"},cmd:["yeting"]},desc:{zh:"新四軍軍部北移途中在皖南被國軍包圍攻擊，大部損失，軍長葉挺被扣、副軍長項英遇害。國共統一戰線名存實亡。",en:"The New 4th Army headquarters column was surrounded and destroyed by Nationalist forces in southern Anhui; Ye Ting was imprisoned. The United Front survived in name only."},note:{zh:"國方稱新四軍違令不依指定路線北移；中共稱蓄謀圍殲。雙方敘事至今對立。",en:"The KMT said the unit defied movement orders; the CCP calls it a premeditated massacre. Narratives remain opposed."}},
{p:[112.94,28.23],zh:"三次長沙會戰",en:"Battles of Changsha",date:"1939–1942",result:"kmt",k:{str:{zh:"第九戰區約30萬",en:"~300,000, 9th War Zone"},cmd:["xueyue"]},c:null,desc:{zh:"薛岳以「天爐戰法」三度挫敗日軍對長沙的進攻，是正面戰場少數的大規模防禦勝利（此為國軍對日作戰，列出以呈現全局態勢）。",en:"Xue Yue's 'cauldron' defense repelled three Japanese offensives against Changsha — shown here for overall context (a Nationalist victory over Japan, not a KMT-CCP battle)."}}],

{id:6,years:[1945.6,1948.6],title:{zh:"重慶談判與全面內戰",en:"Chongqing Talks & Civil War Resumes"},yr:"1945–1948",
narrative:{zh:"1945年8月日本投降，毛澤東赴重慶與蔣介石談判，10月10日簽署雙十協定，但停戰終告破裂。國軍約430萬對共軍約127萬。中共搶先進入蘇軍佔領的東北；1946年6月全面內戰爆發。國軍初期攻勢凌厲，1947年3月佔領延安，但戰線過長。1947年中共轉入反攻：劉鄧大軍躍進大別山，林彪在東北秋冬攻勢連捷，粟裕在孟良崮全殲整編74師。至1948年中，攻守之勢逆轉。",en:"After Japan's surrender, Mao flew to Chongqing and signed the Double Tenth Agreement on Oct 10, 1945 — but the truce collapsed. Some 4.3 million Nationalist troops faced ~1.27 million Communists. The CCP raced into Soviet-occupied Manchuria; full war erupted in June 1946. Early Nationalist offensives took Yan'an in March 1947, but overstretched. The CCP counterattacked: Liu Bocheng and Deng Xiaoping struck into the Dabie Mountains, Lin Biao won repeated offensives in Manchuria, and Su Yu annihilated the elite 74th Division at Menglianggu. By mid-1948 the tide had turned."},

{p:[106.55,29.56],zh:"重慶談判",en:"Chongqing Negotiations",date:"1945.8–10",result:"none",k:{str:null,cmd:["chiang"]},c:{str:null,cmd:["mao","zhouenlai"]},desc:{zh:"毛澤東在美國大使赫爾利陪同下飛抵重慶，與蔣介石談判43天，簽訂《雙十協定》，同意「和平建國」，但軍隊與解放區問題懸而未決，1946年政協決議亦告破裂。",en:"Mao flew to Chongqing escorted by US Ambassador Hurley for 43 days of talks, producing the Double Tenth Agreement on 'peaceful nation-building' — but army and territorial issues were unresolved, and the deal collapsed in 1946."}},
{p:[124.37,43.17],zh:"四平戰役",en:"Battle of Siping",date:"1946.4–5",result:"kmt",k:{str:{zh:"新一軍、新六軍等約30萬",en:"~300,000 incl. New 1st & 6th Armies"},cmd:["duyuming"]},c:{str:{zh:"東北民主聯軍約10餘萬",en:"~100,000+"},cmd:["linbiao"]},desc:{zh:"林彪奉命死守四平月餘，終被杜聿明的美械精銳擊破，共軍一路北撤過松花江。國軍止步於此後雙方隔江對峙，東北格局暫定。",en:"Lin Biao held Siping for a month before Du Yuming's US-equipped elites broke through, driving the Communists north across the Songhua River, where the front stabilized."}},
{p:[109.49,36.60],zh:"延安失守",en:"Fall of Yan'an",date:"1947.3",result:"kmt",k:{str:{zh:"胡宗南部約25萬",en:"~250,000"},cmd:["husongnan"]},c:{str:{zh:"西北野戰兵團約2.6萬",en:"~26,000"},cmd:["pengdehuai"]},desc:{zh:"胡宗南攻佔中共首府延安，國府宣傳為重大勝利；中共中央早已主動撤離，彭德懷隨後以青化砭、羊馬河、蟠龍三戰三捷消耗胡部，1948年4月收復延安。",en:"Hu Zongnan took the Communist capital — trumpeted as a great victory — but the CCP had already evacuated. Peng Dehuai then bled Hu's army in three quick battles and retook Yan'an in April 1948."},note:{zh:"「攻佔延安」常被視為國軍勝利頂點，實為虛勝：未殲共軍主力，反陷泥潭。",en:"Often cited as the Nationalist high-water mark, it was a hollow victory that trapped Hu's forces."}},
{p:[118.25,35.65],zh:"孟良崮戰役",en:"Menglianggu",date:"1947.5",result:"ccp",k:{str:{zh:"整編74師3.2萬（全軍4個兵團45萬在側）",en:"32,000 (74th Div.; 450,000 nearby)"},cmd:["liuzhi"]},c:{str:{zh:"華東野戰軍5個縱隊約27萬",en:"~270,000"},cmd:["suyu","chenyi"]},desc:{zh:"粟裕「百萬軍中取上將首級」，從國軍重兵集團中央割裂出王牌整編74師，圍殲於孟良崮，師長張靈甫陣亡。",en:"Su Yu cut the elite 74th Division out of the center of a massive Nationalist formation and annihilated it on Menglianggu mountain; commander Zhang Lingfu was killed."},note:{zh:"張靈甫之死，中共稱擊斃，國府稱「殺身成仁」自戕，記載不一。",en:"Whether Zhang was killed in action or died by suicide is disputed between the two sides' accounts."}},
{p:[115.7,31.3],zh:"千里躍進大別山",en:"Thrust into the Dabie Mountains",date:"1947.6–8",result:"ccp",k:null,c:{str:{zh:"晉冀魯豫野戰軍主力約12萬",en:"~120,000"},cmd:["liubocheng"]},desc:{zh:"劉伯承、鄧小平率部強渡黃河，千里躍進大別山，直插國統區心臟，迫使國軍由全面進攻轉為兩翼防禦，被視為內戰戰略轉折點。",en:"Liu Bocheng and Deng Xiaoping crossed the Yellow River and drove 500 km into the Dabie Mountains at the heart of Nationalist territory — the strategic turning point that forced the KMT onto the defensive."}}],

{id:7,years:[1948.6,1949.1],title:{zh:"三大戰役",en:"The Three Great Campaigns"},yr:"1948–1949",
narrative:{zh:"1948年9月至1949年1月，三場決定性戰役在四個多月內殲滅國軍約150餘萬精銳。遼瀋戰役（9.12–11.2）東北野戰軍先克錦州關門打狗，全取東北；淮海戰役／徐蚌會戰（11.6–1.10）華東、中原兩野戰軍以60萬對80萬，分割殲滅黃百韜、黃維、杜聿明三個集團；平津戰役（11.29–1.31）百萬大軍隔斷華北，天津29小時被攻克，傅作義率25萬守軍接受和平改編，北平古都無戰易手。",en:"Between Sept 1948 and Jan 1949, three decisive campaigns destroyed some 1.5 million of the Nationalists' best troops. In Liaoshen (Sept 12–Nov 2) Lin Biao took Jinzhou to 'shut the door' and swept Manchuria. In Huaihai (Nov 6–Jan 10), 600,000 Communists encircled and destroyed three army groups totaling 800,000. In Pingjin (Nov 29–Jan 31), Tianjin fell in 29 hours and Fu Zuoyi surrendered Beiping peacefully with 250,000 men."},

narrative:{zh:"1949年1月蔣介石下野，李宗仁代總統主持和談，4月20日和談破裂。當夜解放軍第二、三野戰軍百萬大軍在西起湖口、東至江陰的千里戰線強渡長江，4月23日佔南京，5月27日克上海。此後各路南下西進：8月蘭州、10月廣州、11月重慶、12月成都相繼易手，雲南、新疆等地通電起義。10月1日毛澤東在北京宣告中華人民共和國成立；12月7日中華民國政府遷臺北。10月下旬金門古寧頭一役，登島解放軍9千餘人全軍覆沒，兩岸分治格局自此底定。",en:"Chiang stepped down in January 1949; peace talks under acting president Li Zongren collapsed on April 20. That night a million men of the 2nd and 3rd Field Armies forced the Yangtze along a 500-km front, taking Nanjing on April 23 and Shanghai on May 27. Lanzhou fell in August, Guangzhou in October, Chongqing in November, Chengdu in December, while Yunnan and Xinjiang defected. Mao proclaimed the PRC in Beijing on October 1; the ROC government moved to Taipei on December 7. At Guningtou on Quemoy in late October, a 9,000-man PLA landing force was wiped out — fixing the cross-strait division that endures."},

// ===== 全域狀態 =====
let LANG='zh', NAMEMODE='hist', PHASE=0, PLAYING=false, playTimer=null, NARRATE=false;
const $=id=>document.getElementById(id);
const SVGNS='http://www.w3.org/2000/svg';
function el(tag,attrs,parent){const e=document.createElementNS(SVGNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);if(parent)parent.appendChild(e);return e;}
function T(o){return o?(LANG==='zh'?o.zh:o.en):'';}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ===== 靜態圖層 =====
function drawBase(){
  const gp=$('provs');
  for(const pr of PROVINCE_PATHS){
    const p=el('path',{d:pr.d,class:'prov','data-id':pr.id},gp);
    p.addEventListener('click',()=>{});
  }
  const gl=$('labels');
  for(const id in PROV_LABEL){
    const nm=PROV_NAMES[id];if(!nm)continue;
    const [lon,lat]=PROV_LABEL[id];
    const t=el('text',{x:PX(lon),y:PY(lat),class:'provname','data-id':id},gl);
    t.textContent=LANG==='zh'?nm.zh:nm.en;
  }
  const gr=$('rivers');
  for(const r of RIVERS){
    el('path',{d:'M'+r.pts.map(c=>PX(c[0]).toFixed(1)+' '+PY(c[1]).toFixed(1)).join('L'),class:'river'},gr);
    const t=el('text',{x:PX(r.label[0]),y:PY(r.label[1]),class:'rivername'},gr);
    t.textContent=T(r.name);
  }
  for(const m of MOUNTAINS){
    const t=el('text',{x:PX(m.p[0]),y:PY(m.p[1]),class:'mtn','text-anchor':'middle'},gr);
    t.textContent=LANG==='zh'?m.zh:m.en;
  }
  const gc=$('cities');
  for(const c of CITIES){
    const g=el('g',{class:'city'+(c.cap?' capital':'')},gc);
    el('circle',{cx:PX(c.p[0]),cy:PY(c.p[1]),r:c.cap?4:3},g);
    const t=el('text',{x:PX(c.p[0])+5,y:PY(c.p[1])+3.5},g);
    t.textContent=LANG==='zh'?c.zh:c.en;
    g.addEventListener('click',ev=>{ev.stopPropagation();showCity(c);});
  }
  // 箭頭標記
  const defs=document.querySelector('#mapsvg defs');
  for(const s of['kmt','ccp']){
    const mk=el('marker',{id:'ah-'+s,viewBox:'0 0 10 10',refX:8,refY:5,markerWidth:5,markerHeight:5,orient:'auto-start-reverse'},defs);
    el('path',{d:'M0 0L10 5L0 10z',class:'arrowhead '+s},mk);
  }
}
function refreshLabels(){
  document.querySelectorAll('.provname').forEach(t=>{const nm=PROV_NAMES[t.dataset.id];t.textContent=LANG==='zh'?nm.zh:nm.en;});
  document.querySelectorAll('#rivers text.rivername').forEach((t,i)=>{t.textContent=T(RIVERS[i].name);});
  document.querySelectorAll('#rivers text.mtn').forEach((t,i)=>{t.textContent=LANG==='zh'?MOUNTAINS[i].zh:MOUNTAINS[i].en;});
  document.querySelectorAll('#cities .city').forEach((g,i)=>{g.querySelector('text').textContent=LANG==='zh'?CITIES[i].zh:CITIES[i].en;});
}

// ===== 動態圖層（依幕渲染）=====
function battleName(b){
  if(NAMEMODE==='pop'&&b.alt)return LANG==='zh'?b.alt.zh:b.alt.en;
  return LANG==='zh'?b.zh:b.en;
}
function renderPhase(){
  const ph=PHASES[PHASE];
  // 控制區
  document.querySelectorAll('.prov').forEach(p=>{
    p.setAttribute('class','prov'+(ph.control[p.dataset.id]?' '+ph.control[p.dataset.id]:''));
  });
  // 根據地
  const gz=$('zones');gz.innerHTML='';
  for(const z of(ph.zones||[])){
    el('ellipse',{cx:PX(z.p[0]),cy:PY(z.p[1]),rx:z.rx,ry:z.ry,class:'zone ccp'},gz);
    const t=el('text',{x:PX(z.p[0]),y:PY(z.p[1])-z.ry-3,class:'zonelabel'},gz);
    t.textContent=LANG==='zh'?z.zh:z.en;
  }
  // 長征路線
  if(ph.march){
    el('path',{d:'M'+ph.march.map(c=>PX(c[0]).toFixed(1)+' '+PY(c[1]).toFixed(1)).join('L'),class:'marchroute','marker-end':'url(#ah-ccp)'},gz);
  }
  // 箭頭
  const ga=$('arrows');ga.innerHTML='';
  for(const a of(ph.arrows||[])){
    el('path',{d:'M'+a.pts.map(c=>PX(c[0]).toFixed(1)+' '+PY(c[1]).toFixed(1)).join('L'),class:'arrow '+a.side,'marker-end':'url(#ah-'+a.side+')'},ga);
  }
  // 軍團
  const gm=$('armies');gm.innerHTML='';
  for(const a of(ph.armies||[])){
    const g=el('g',{class:'army '+a.side},gm);
    const name=LANG==='zh'?a.zh:a.en;
    const w=Math.max(name.length*(LANG==='zh'?10:5.6)+10,46);
    const x=PX(a.p[0]),y=PY(a.p[1]);
    const r=el('rect',{x:x-w/2,y:y-8,width:w,height:16,rx:3},g);
    if(a.side==='jp')r.style.fill='#555';
    const t=el('text',{x:x,y:y+3.5},g);t.textContent=name;
    g.addEventListener('click',ev=>{ev.stopPropagation();showArmy(a);});
  }
  // 戰役
  const gb=$('battles');gb.innerHTML='';
  for(const b of(ph.battles||[])){
    const cls=b.result==='ccp'?'cwin':b.result==='kmt'?'kwin':'';
    const g=el('g',{class:'battle '+cls},gb);
    const x=PX(b.p[0]),y=PY(b.p[1]);
    const pts=[];for(let i=0;i<10;i++){const r=i%2?3.2:7.5,a=-Math.PI/2+i*Math.PI/5;pts.push((x+r*Math.cos(a)).toFixed(1)+','+(y+r*Math.sin(a)).toFixed(1));}
    el('polygon',{points:pts.join(' '),class:'star'},g);
    const t=el('text',{x:x+9,y:y-5},g);t.textContent=battleName(b);
    g.addEventListener('click',ev=>{ev.stopPropagation();showBattle(b);});
  }
  // 敘述
  $('narr-title').textContent=(PHASE+1)+'. '+T(ph.title);
  $('narr-yr').textContent=ph.yr;
  $('narr-text').textContent=T(ph.narrative);
  document.querySelectorAll('#phasebtns .pb').forEach((b,i)=>b.classList.toggle('active',i===PHASE));
}

// ===== 彈出框 =====
function openPopup(html){$('popupbody').innerHTML=html;$('popup').classList.add('show');
  $('popupbody').querySelectorAll('.cmdlink').forEach(a=>a.addEventListener('click',()=>showCommander(a.dataset.id)));}
function closePopup(){$('popup').classList.remove('show');}
function cmdLinks(ids){return(ids||[]).map(id=>'<span class="cmdlink" data-id="'+id+'">'+esc(cmdName(id))+'</span>').join('、');}
function showBattle(b){
  let h='<h3>⭐ '+esc(battleName(b))+'</h3><div class="meta">'+T(UI.date)+'：'+b.date+'</div>';
  if(b.alt)h+='<div class="row"><b>'+(NAMEMODE==='hist'?(LANG==='zh'?'俗稱／另稱':'Also known as'):(LANG==='zh'?'史實名稱':'Historical name'))+'：</b>'+esc(NAMEMODE==='hist'?T(b.alt):(LANG==='zh'?b.zh:b.en))+'</div>';
  if(b.k)h+='<div class="row"><b>'+T(UI.kside)+'：</b>'+(b.k.str?esc(T(b.k.str)):'')+(b.k.cmd?'　'+cmdLinks(b.k.cmd):'')+'</div>';
  if(b.c)h+='<div class="row"><b>'+T(UI.cside)+'：</b>'+(b.c.str?esc(T(b.c.str)):'')+(b.c.cmd?'　'+cmdLinks(b.c.cmd):'')+'</div>';
  const rc=b.result==='ccp'?'result-c':b.result==='kmt'?'result-k':'result-n';
  h+='<div class="row"><b>'+T(UI.result)+'：</b><span class="'+rc+'">'+T(UI.resultTxt[b.result])+'</span></div>';
  h+='<div class="row">'+esc(T(b.desc))+'</div>';
  if(b.note)h+='<div class="note"><b>'+T(UI.noteHdr)+'：</b>'+esc(T(b.note))+'</div>';
  openPopup(h);
}
function showCommander(id){
  const c=COMMANDERS[id];if(!c)return;
  const side=LANG==='zh'?SIDES[c.side].zh:SIDES[c.side].en;
  openPopup('<h3>'+(c.side==='kmt'?'🔵':'🔴')+' '+esc(LANG==='zh'?c.zh:c.en)+'</h3><div class="meta">'+esc(side)+'</div><div class="row">'+esc(T(c.bio))+'</div>');
}
function showCity(c){
  openPopup('<h3>● '+esc(LANG==='zh'?c.zh:c.en)+'</h3><div class="row">'+esc(T(c.blurb))+'</div>');
}
function showArmy(a){
  let h='<h3>'+(a.side==='kmt'?'🔵':a.side==='ccp'?'🔴':'⚫')+' '+esc(LANG==='zh'?a.zh:a.en)+'</h3>';
  if(a.str)h+='<div class="row"><b>'+(LANG==='zh'?'兵力':'Strength')+'：</b>'+esc(T(a.str))+'</div>';
  if(a.cmd)h+='<div class="row"><b>'+T(UI.cmdHdr)+'：</b>'+cmdLinks(a.cmd)+'</div>';
  openPopup(h);
}

// ===== 旁白（瀏覽器內建語音合成，無外部服務）=====
function pickVoice(){
  const want=LANG==='zh'?['zh-TW','zh-HK','zh-CN','zh']:['en-US','en-GB','en'];
  const vs=window.speechSynthesis?speechSynthesis.getVoices():[];
  for(const w of want){const v=vs.find(v=>v.lang&&v.lang.toLowerCase().startsWith(w.toLowerCase()));if(v)return v;}
  return null;
}
function speakPhase(){
  if(!NARRATE||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const ph=PHASES[PHASE];
  const text=(LANG==='zh'?('第'+(PHASE+1)+'幕，'+ph.title.zh+'。'):('Act '+(PHASE+1)+'. '+ph.title.en+'. '))+T(ph.narrative);
  const u=new SpeechSynthesisUtterance(text);
  u.lang=LANG==='zh'?'zh-TW':'en-US';
  const v=pickVoice();if(v)u.voice=v;
  u.rate=0.95;
  speechSynthesis.speak(u);
}
function toggleNarrate(){
  NARRATE=!NARRATE;
  $('narratebtn').textContent=T(NARRATE?UI.narrateOn:UI.narrateOff);
  $('narratebtn').classList.toggle('active',NARRATE);
  if(NARRATE){
    if(!window.speechSynthesis){alert(LANG==='zh'?'此瀏覽器不支援語音合成':'Speech synthesis not supported in this browser');NARRATE=false;$('narratebtn').classList.remove('active');return;}
    speechSynthesis.getVoices(); // 觸發語音清單載入（Safari/Chrome 首次為空）
    speakPhase();
  }else if(window.speechSynthesis){speechSynthesis.cancel();}
}

// ===== 時間軸 =====
const SLIDER_MAX=800,SEG=SLIDER_MAX/PHASES.length;
function sliderToPhase(v){return Math.min(PHASES.length-1,Math.floor(v/SEG));}
function updateFromSlider(){
  const v=+$('slider').value,ph=sliderToPhase(v);
  const p=PHASES[ph],frac=(v-ph*SEG)/SEG;
  const yr=p.years[0]+(p.years[1]-p.years[0])*frac;
  $('yearlabel').textContent=Math.floor(yr);
  if(ph!==PHASE){PHASE=ph;renderPhase();speakPhase();}
}
function gotoPhase(i,mid){PHASE=i;$('slider').value=i*SEG+(mid?SEG*0.5:0);const p=PHASES[i];$('yearlabel').textContent=Math.floor(p.years[0]+(mid?(p.years[1]-p.years[0])/2:0));renderPhase();speakPhase();}
function buildPhaseBtns(){
  const c=$('phasebtns');c.innerHTML='';
  PHASES.forEach((p,i)=>{
    const b=document.createElement('button');b.className='pb';b.textContent=(i+1)+'. '+T(p.title);
    b.addEventListener('click',()=>{stopPlay();gotoPhase(i,true);});
    c.appendChild(b);
  });
}
// 自動播放
function startPlay(){
  PLAYING=true;$('playbtn').textContent='⏸';
  if(PHASE>=PHASES.length-1)gotoPhase(0,true);
  playTimer=setInterval(()=>{
    if(NARRATE&&window.speechSynthesis&&speechSynthesis.speaking)return; // 等旁白唸完再換幕
    if(PHASE>=PHASES.length-1){stopPlay();return;}
    gotoPhase(PHASE+1,true);
  },8000);
}
function stopPlay(){PLAYING=false;$('playbtn').textContent='▶';if(playTimer){clearInterval(playTimer);playTimer=null;}}

// ===== 圖例 / 介面 =====
function buildLegend(){
  $('legend').innerHTML=UI.legend.map(([k,n])=>{
    const col=getComputedStyle(document.documentElement).getPropertyValue('--'+k+'-fill')||'';
    return '<div><i style="background:var(--'+k+'-fill);border:1px solid var(--'+k+')"></i>'+esc(T(n))+'</div>';
  }).join('');
}
function refreshUI(){
  $('title-zh').textContent=T(UI.title);
  $('langbtn').textContent=LANG==='zh'?'EN':'中文';
  $('namebtn').textContent=T(UI.namebtn[NAMEMODE==='hist'?'pop':'hist']);
  $('aboutbtn').textContent=T(UI.about);
  $('narratebtn').textContent=T(NARRATE?UI.narrateOn:UI.narrateOff);
  buildLegend();buildPhaseBtns();refreshLabels();renderPhase();
}

// ===== 縮放平移 =====
let view={x:0,y:0,k:1};
function applyView(){$('viewport').setAttribute('transform','translate('+view.x+' '+view.y+') scale('+view.k+')');}
function setupPanZoom(){
  const svg=$('mapsvg');let dragging=false,lx=0,ly=0,pinch=null;
  const pt=ev=>{const r=svg.getBoundingClientRect();const sc=Math.min(r.width/1000,r.height/750);
    return{x:(ev.clientX-r.left),y:(ev.clientY-r.top),sc:sc};};
  svg.addEventListener('wheel',ev=>{ev.preventDefault();
    const f=ev.deltaY<0?1.15:1/1.15,nk=Math.min(8,Math.max(1,view.k*f));
    const r=svg.getBoundingClientRect();
    // 以 SVG 使用者座標為中心縮放
    const vbScale=Math.min(r.width/1000,r.height/750);
    const ox=(r.width-1000*vbScale)/2,oy=(r.height-750*vbScale)/2;
    const ux=(ev.clientX-r.left-ox)/vbScale,uy=(ev.clientY-r.top-oy)/vbScale;
    view.x=ux-(ux-view.x)*(nk/view.k);view.y=uy-(uy-view.y)*(nk/view.k);view.k=nk;
    if(view.k===1){view.x=0;view.y=0;}
    applyView();},{passive:false});
  svg.addEventListener('pointerdown',ev=>{if(ev.isPrimary){dragging=true;lx=ev.clientX;ly=ev.clientY;}});
  window.addEventListener('pointermove',ev=>{if(dragging&&ev.isPrimary&&view.k>1){
    const r=svg.getBoundingClientRect();const vbScale=Math.min(r.width/1000,r.height/750);
    view.x+=(ev.clientX-lx)/vbScale;view.y+=(ev.clientY-ly)/vbScale;lx=ev.clientX;ly=ev.clientY;applyView();}});
  window.addEventListener('pointerup',()=>dragging=false);
  // 觸控雙指縮放
  svg.addEventListener('touchstart',ev=>{if(ev.touches.length===2){pinch=dist(ev);}},{passive:true});
  svg.addEventListener('touchmove',ev=>{if(ev.touches.length===2&&pinch){ev.preventDefault();
    const d=dist(ev),nk=Math.min(8,Math.max(1,view.k*d/pinch));pinch=d;view.k=nk;
    if(view.k===1){view.x=0;view.y=0;}applyView();}},{passive:false});
  svg.addEventListener('touchend',()=>pinch=null);
  function dist(ev){const a=ev.touches[0],b=ev.touches[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}
}

// ===== 事件繫結與啟動 =====
$('slider').addEventListener('input',()=>{stopPlay();updateFromSlider();});
$('playbtn').addEventListener('click',()=>PLAYING?stopPlay():startPlay());
$('langbtn').addEventListener('click',()=>{LANG=LANG==='zh'?'en':'zh';document.documentElement.lang=LANG==='zh'?'zh-Hant':'en';refreshUI();closePopup();speakPhase();});
$('narratebtn').addEventListener('click',toggleNarrate);
$('namebtn').addEventListener('click',()=>{NAMEMODE=NAMEMODE==='hist'?'pop':'hist';$('namebtn').textContent=T(UI.namebtn[NAMEMODE==='hist'?'pop':'hist']);renderPhase();});
$('aboutbtn').addEventListener('click',()=>openPopup(T(UI.aboutText)));
$('popupclose').addEventListener('click',closePopup);
$('mapsvg').addEventListener('click',ev=>{if(ev.target.tagName!=='text')closePopup();});

drawBase();setupPanZoom();refreshUI();gotoPhase(0,false);
</script>
